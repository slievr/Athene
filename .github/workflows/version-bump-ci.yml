name: CI

# Satisfies the required status checks for version bump branches (release/**).
# These branches only modify package.json and CHANGELOG.md — there is no code
# to lint, typecheck, or test. Jobs complete immediately with success so that
# the release/* PR can auto-merge without running the full CI suite.
#
# Job names must exactly match the names required by the main branch ruleset:
# Lint, Typecheck, Integration Tests, Test Fresh Onboarding, Test, Test Web.

on:
  push:
    branches: ['release/**']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version bump branch — no code changes to lint."

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version bump branch — no code changes to typecheck."

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version bump branch — no code changes to test."

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version bump branch — no code changes to test."

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version bump branch — no integration changes to test."

  onboarding-test:
    name: Test Fresh Onboarding
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version bump branch — no onboarding changes to test."
