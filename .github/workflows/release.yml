name: Release

# Release pipeline: version bumps + npm publish via changesets.
#
# On every push to main (after CI passes), if changeset files are present this
# job runs `changeset version`, commits the version bump directly to main, then
# immediately publishes to npm. No intermediate "Version Packages" PR is opened.
#
# If no changeset files are present, the job is a no-op (nothing to publish).
#
# Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# id-token: write lets GitHub Actions mint an OIDC token; the npm CLI exchanges
# it automatically for a short-lived publish credential. Provenance attestations
# are generated automatically as part of Trusted Publishing.
# See: https://docs.npmjs.com/trusted-publishers
#
# Before the first publish, configure a Trusted Publisher for each
# @made-by-moonlight/* package on npmjs.com pointing at this workflow file
# (release.yml) in the slievr/Athene repo. GITHUB_TOKEN is automatic.

on:
  workflow_run:
    # Depends on the workflow named "CI" in .github/workflows/ci.yml — if
    # you rename that file or change its `name:` field, update this string
    # too. GitHub matches by name (not filename) and silently no-ops on
    # mismatch — so a rename here will mean releases never trigger again.
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # npm provenance via OIDC

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip the version-bump commit itself — it has no changesets and we already
    # published in the run that created it. Without this guard the job would run
    # twice per release (once per feature commit, once per the version-bump push).
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore: version packages')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # contents: write permission above allows pushing the version-bump commit
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: echo "HUSKY=0" >> $GITHUB_ENV
      - run: pnpm install --frozen-lockfile
      # Pre-publish guard: catches the case where a publishable package has a
      # workspace:* runtime dep on a `private: true` package — pnpm would
      # rewrite the dep on publish to a version that doesn't exist on npm,
      # breaking `npm install -g @made-by-moonlight/athene`. Still runs here so the
      # public repo blocks a malformed version bump before it reaches npm.
      - run: node scripts/check-publishable-deps.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # If changeset files exist, bump versions, commit, and push to main.
      # The version-bump commit is excluded from future release runs via the
      # job-level `if:` guard above, preventing a second publish attempt.
      - name: Version packages
        run: |
          pending=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$pending" -gt 0 ]; then
            pnpm changeset version
            git add -A
            git commit -m "chore: version packages"
            git push origin HEAD:main
          fi

      # Determine whether a new version was just produced (either by the step
      # above or already present in this commit). This distinguishes a plain
      # commit with no changesets (no-op) from a version-bump run.
      - name: Determine release state
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./packages/athene/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

          prev_version=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            prev_version=$(git show HEAD^:packages/athene/package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          fi
          if [ -n "$prev_version" ] && [ "$prev_version" != "$version" ]; then
            echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

          if git ls-remote --tags --exit-code origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "tag_on_remote=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_on_remote=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "v$version" --json tagName >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # `pnpm release` = pnpm -r build && node scripts/publish.mjs.
      # scripts/publish.mjs uses `pnpm pack` (not `npm pack`) to generate
      # the tarball so that workspace:* deps are rewritten to resolved
      # semver versions before the package reaches npm. It also skips
      # packages whose current version is already published (idempotent).
      - name: Publish packages
        if: steps.state.outputs.is_release_commit == 'true'
        run: pnpm release

      # Push the umbrella `vX.Y.Z` tag only if this is a fresh version-bump
      # commit AND the tag isn't already on the remote (idempotent on re-run).
      - name: Tag versioned packages
        if: steps.state.outputs.is_release_commit == 'true' && steps.state.outputs.tag_on_remote == 'false'
        run: |
          git tag "v${{ steps.state.outputs.version }}"
          git push origin "v${{ steps.state.outputs.version }}"

      # Public-facing GitHub release. Stable channel — not a prerelease.
      # Skipped if a release for this version already exists (idempotent).
      - name: Create GitHub release
        if: steps.state.outputs.is_release_commit == 'true' && steps.state.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.state.outputs.version }}" \
            --generate-notes
