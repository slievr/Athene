name: Release

# Release pipeline: auto-generate changeset → version bump → npm publish → tag → commit to main.
#
# Stable flow (triggered by CI completing on main):
#   1. Compare HEAD to the last stable tag; if no new commits, exit.
#   2. Auto-generate a changeset from conventional commits if none are pending.
#   3. Run `changeset version` to bump all packages.
#   4. Publish to npm via OIDC trusted publishing.
#   5. Push the vX.Y.Z git tag.
#   6. Commit the version bump (updated package.json / CHANGELOG / deleted changesets)
#      directly to main using RELEASE_TOKEN (a fine-grained PAT with Contents: write
#      that can bypass the branch-protection status-check requirement).
#      The commit carries [skip ci] to prevent an infinite release loop.
#   7. Create the GitHub release.
#
# Canary flow (triggered when canary.yml pushes a v*-nightly-* tag):
#   - Checks out the snapshot commit, builds, and publishes under --tag nightly.
#   - GitHub prerelease is created by canary.yml, not here.
#
# All npm publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# See: https://docs.npmjs.com/trusted-publishers
#
# RELEASE_TOKEN setup (one-time):
#   1. Go to https://github.com/settings/tokens → Fine-grained tokens → Generate new token
#   2. Repository access: Only slievr/Athene
#   3. Permissions: Repository permissions → Contents → Read and write
#   4. Add the token as a repository secret named RELEASE_TOKEN

on:
  workflow_dispatch:
  workflow_run:
    # Depends on the workflow named "CI" in .github/workflows/ci.yml.
    # GitHub matches by name (not filename) — if ci.yml is renamed, update here too.
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v*-nightly-*' # canary.yml pushes these; this workflow handles npm publish

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance via OIDC

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          # RELEASE_TOKEN is a fine-grained PAT (Contents: write) used to push
          # the version-bump commit directly to main, bypassing required status
          # checks. Falls back to GITHUB_TOKEN when the secret is absent (the
          # git push step will then fail if branch protection is active).
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: echo "HUSKY=0" >> $GITHUB_ENV
      - run: pnpm install --frozen-lockfile
      # Pre-publish guard: catches workspace:* runtime deps on private packages.
      - run: node scripts/check-publishable-deps.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Detect whether this is a stable run (workflow_run / dispatch) or a
      # canary run (triggered by canary.yml pushing a nightly tag).
      - name: Detect release type
        id: type
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*-nightly-* ]]; then
            echo "is_canary=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_canary=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Canary publish ──────────────────────────────────────────────────────
      # Build from the snapshot commit and publish under --tag nightly.
      # The GitHub prerelease is already created by canary.yml.
      - name: Publish canary packages
        if: steps.type.outputs.is_canary == 'true'
        run: pnpm -r build && node scripts/publish.mjs --tag nightly

      # ── Stable: check for releasable commits ────────────────────────────────
      # Compare HEAD to the last stable tag (nightly snapshots excluded).
      # Version-bump commits are filtered out so they don't count as new work.
      - name: Check for releasable commits
        id: check
        if: steps.type.outputs.is_canary != 'true'
        run: |
          last_tag=$(git describe --tags --abbrev=0 --exclude='*-nightly-*' 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            echo "No previous tag — proceeding."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          new_commits=$(git log "${last_tag}..HEAD" --pretty=format:"%s" \
            | grep -cvE "^chore: version packages" || true)
          if [ "$new_commits" -eq 0 ]; then
            echo "No new commits since ${last_tag} — nothing to release."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "${new_commits} new commit(s) since ${last_tag}."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Stable: auto-generate changeset ────────────────────────────────────
      # Derives bump type from conventional commit prefixes (feat → minor, else → patch).
      # Skipped when the developer already added a changeset manually.
      - name: Auto-generate changeset
        if: steps.type.outputs.is_canary != 'true' && steps.check.outputs.has_changes == 'true'
        run: |
          pending=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$pending" -gt 0 ]; then
            echo "Existing changeset files found — skipping auto-generate."
            exit 0
          fi

          last_tag=$(git describe --tags --abbrev=0 --exclude='*-nightly-*' 2>/dev/null || echo "")
          range="${last_tag:+${last_tag}..}HEAD"
          commits=$(git log "$range" --pretty=format:"%s" \
            | grep -vE "^chore: version packages" | head -50)

          if [ -z "$commits" ]; then
            echo "No commits to summarise — nothing to auto-generate."
            exit 0
          fi

          bump="patch"
          if echo "$commits" | grep -qE "^feat(\([^)]+\))?!?:"; then
            bump="minor"
          fi

          summary=$(echo "$commits" | sed 's/^/- /')
          sha=$(git rev-parse --short HEAD)
          # List every package in the linked group so changeset version bumps
          # them all, even if they have drifted to different versions.
          linked=$(node -e "
            const cfg = require('./.changeset/config.json');
            (cfg.linked[0] || []).forEach(p => console.log(p));
          ")
          {
            echo '---'
            while IFS= read -r pkg; do
              echo "\"${pkg}\": ${bump}"
            done <<< "$linked"
            echo '---'
            echo ""
            echo "$summary"
          } > ".changeset/auto-${sha}.md"

          echo "Generated ${bump} changeset ($(echo "$commits" | wc -l | tr -d ' ') commits)."

      # ── Stable: version, publish, tag, commit ───────────────────────────────
      - name: Version, publish, and commit to main
        if: steps.type.outputs.is_canary != 'true' && steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pending=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$pending" -eq 0 ]; then
            echo "No changesets to consume — nothing to release."
            exit 0
          fi

          pnpm changeset version
          new_version=$(node -p "require('./packages/athene/package.json').version")
          echo "Releasing v${new_version}"

          # Build and publish to npm. publish.mjs skips already-published versions.
          pnpm release

          # Push the version tag.
          if ! git ls-remote --tags --exit-code origin "refs/tags/v${new_version}" >/dev/null 2>&1; then
            git tag "v${new_version}"
            git push origin "v${new_version}"
          fi

          # Commit the version bump directly to main.
          # [skip ci] prevents this commit from triggering another release cycle.
          # Requires RELEASE_TOKEN (a fine-grained PAT) to bypass branch protection.
          git add -A
          git commit -m "chore: version packages to ${new_version} [skip ci]"
          git push origin HEAD:main

          # Create the GitHub release (idempotent).
          if ! gh release view "v${new_version}" --json tagName >/dev/null 2>&1; then
            gh release create "v${new_version}" --generate-notes
          fi
