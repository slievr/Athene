name: Release

# Release pipeline: version bumps + npm publish via changesets.
#
# Two-phase flow (branch protection prevents direct pushes to main):
#
# Phase 1 — triggered by any feature commit landing on main:
#   - Auto-generates a changeset from conventional commit messages if none exist
#     (skipped if the current package version is not yet on npm — that means a
#      version bump already happened and we're waiting for it to be published)
#   - Runs `changeset version` to bump versions
#   - Opens a "chore: version packages" PR and enables auto-merge; CI runs on
#     the PR and it merges automatically when all checks pass
#
# Phase 2 — triggered by the version-bump PR merging to main:
#   - npm check finds the new version is not yet published → publishes
#   - Creates the vX.Y.Z git tag and GitHub release
#
# Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# id-token: write lets GitHub Actions mint an OIDC token; the npm CLI exchanges
# it automatically for a short-lived publish credential.
# See: https://docs.npmjs.com/trusted-publishers

on:
  workflow_dispatch: # allows manual triggering from the Actions UI or gh CLI
  workflow_run:
    # Depends on the workflow named "CI" in .github/workflows/ci.yml — if
    # you rename that file or change its `name:` field, update this string
    # too. GitHub matches by name (not filename) and silently no-ops on
    # mismatch — so a rename here will mean releases never trigger again.
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance via OIDC

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: echo "HUSKY=0" >> $GITHUB_ENV
      - run: pnpm install --frozen-lockfile
      # Pre-publish guard: catches the case where a publishable package has a
      # workspace:* runtime dep on a `private: true` package — pnpm would
      # rewrite the dep on publish to a version that doesn't exist on npm,
      # breaking `npm install -g @made-by-moonlight/athene`.
      - run: node scripts/check-publishable-deps.mjs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Auto-generate a changeset when none are present, derived from conventional
      # commit prefixes since the last git tag: feat → minor, everything else → patch.
      #
      # Skipped when the current package version is not yet on npm — that means a
      # version-bump PR already merged and we're in Phase 2 (publish, not bump again).
      - name: Auto-generate changeset
        run: |
          current=$(node -p "require('./packages/athene/package.json').version")
          if npm view "@made-by-moonlight/athene@${current}" version 2>/dev/null | grep -qF "$current"; then
            echo "Version ${current} already on npm — skipping changeset generation (Phase 2)."
            exit 0
          fi

          pending=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$pending" -gt 0 ]; then
            echo "Existing changeset files found, skipping auto-generate."
            exit 0
          fi

          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          range="${last_tag:+${last_tag}..}HEAD"
          commits=$(git log "$range" --pretty=format:"%s" 2>/dev/null | head -50)

          if [ -z "$commits" ]; then
            echo "No commits since last tag, nothing to release."
            exit 0
          fi

          bump="patch"
          if echo "$commits" | grep -qE "^feat(\([^)]+\))?!?:"; then
            bump="minor"
          fi

          summary=$(echo "$commits" | sed 's/^/- /')
          sha=$(git rev-parse --short HEAD)
          {
            echo '---'
            echo "\"@made-by-moonlight/athene\": ${bump}"
            echo '---'
            echo ""
            echo "$summary"
          } > ".changeset/auto-${sha}.md"

          echo "Generated ${bump} changeset ($(echo "$commits" | wc -l | tr -d ' ') commits)."

      # If changeset files exist, bump versions and open an auto-merge PR.
      # Branch protection prevents direct pushes to main, so the version bump
      # goes through a PR where CI runs; it merges automatically when checks pass,
      # triggering Phase 2 (publish) on the next workflow_run event.
      - name: Version packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pending=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$pending" -eq 0 ]; then
            exit 0
          fi

          pnpm changeset version
          new_version=$(node -p "require('./packages/athene/package.json').version")
          branch="release/${new_version}"

          git checkout -b "$branch"
          # Exclude workflow files — GITHUB_TOKEN cannot push commits that
          # modify .github/workflows/ without the `workflows` permission.
          git checkout HEAD -- .github/ 2>/dev/null || true
          git add -A
          git commit -m "chore: version packages"
          # Force-push in case the branch exists from a prior failed run.
          git push --force origin "$branch"

          # Create PR only if one doesn't already exist for this branch.
          if ! gh pr view "$branch" --json number 2>/dev/null | grep -q number; then
            gh pr create \
              --title "chore: version packages" \
              --body "Automated version bump to ${new_version}. Merges automatically once CI passes." \
              --head "$branch" \
              --base main
          fi
          gh pr merge "$branch" --auto --merge

      # Check npm directly to determine whether to publish. This handles both
      # Phase 2 (version-bump PR just merged, version not yet on npm) and
      # failure recovery (any prior run that bumped but didn't publish).
      - name: Determine release state
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./packages/athene/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if npm view "@made-by-moonlight/athene@$version" version 2>/dev/null | grep -qF "$version"; then
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
          fi

          if git ls-remote --tags --exit-code origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "tag_on_remote=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_on_remote=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "v$version" --json tagName >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # `pnpm release` = pnpm -r build && node scripts/publish.mjs.
      # scripts/publish.mjs uses `pnpm pack` so workspace:* deps are rewritten
      # to resolved semver before the tarball reaches npm. Skips already-published
      # versions (idempotent).
      - name: Publish packages
        if: steps.state.outputs.is_release_commit == 'true'
        run: pnpm release

      - name: Tag versioned packages
        if: steps.state.outputs.is_release_commit == 'true' && steps.state.outputs.tag_on_remote == 'false'
        run: |
          git tag "v${{ steps.state.outputs.version }}"
          git push origin "v${{ steps.state.outputs.version }}"

      - name: Create GitHub release
        if: steps.state.outputs.is_release_commit == 'true' && steps.state.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.state.outputs.version }}" \
            --generate-notes
