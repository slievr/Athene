name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal token scope — all jobs only checkout, install, build, and test.
# None of them push code, comment on PRs, or call mutating GitHub APIs.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build all non-web packages
      - run: pnpm -r --filter "!@made-by-moonlight/athene-web" build
      # Typecheck all non-web packages
      - run: pnpm -r --filter "!@made-by-moonlight/athene-web" typecheck
      # Build web (Next.js build includes its own typecheck)
      - run: pnpm --filter @made-by-moonlight/athene-web build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "!@made-by-moonlight/athene-web" build
      - run: pnpm test

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Start tmux server
        run: tmux start-server
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "!@made-by-moonlight/athene-web" build
      - run: pnpm --filter @made-by-moonlight/athene-web test
